<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents | Luxury Boutique</title>
    
    <!-- Tab Icon (Favicon) -->
    <link rel="icon" type="image/png" href="images/logo.png">

    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600;1,700&family=Jost:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C5A059;
            --gold-bright: #fbf5b7;
            --deep-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --gold-gradient: linear-gradient(135deg, #b38728 0%, #fbf5b7 50%, #aa771c 100%);
            --card-bg: linear-gradient(145deg, #111 0%, #080808 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        body { 
            background: var(--deep-black); 
            color: #fff; 
            font-family: 'Jost', sans-serif; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        /* --- PREMIUM ANIMATIONS --- */
        @keyframes shine { from { left: -100%; } to { left: 100%; } }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 5px rgba(197,160,89,0.2); } 50% { box-shadow: 0 0 20px rgba(197,160,89,0.5); } 100% { box-shadow: 0 0 5px rgba(197,160,89,0.2); } }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.8rem 5%;
            display: flex; justify-content: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.4);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem; font-weight: 700; letter-spacing: 6px;
            text-transform: uppercase; text-decoration: none;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        /* --- HERO --- */
        .hero {
            height: 75vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border-bottom: 2px solid var(--gold);
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), var(--deep-black)), 
                        url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=2000') center/cover;
        }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-style: italic; margin-bottom: 15px; letter-spacing: -2px; }
        .hero p { text-transform: uppercase; letter-spacing: 10px; font-weight: 300; font-size: 0.9rem; color: var(--gold); }

        /* --- FILTERS --- */
        .filter-section { padding: 130px 5% 40px; text-align: center; }
        .btn-luxury {
            background: transparent; border: 1px solid var(--gold); color: #fff;
            padding: 14px 40px; margin: 10px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; font-weight: 700;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn-luxury:hover, .btn-luxury.active { background: var(--gold-gradient); color: #000; border-color: transparent; transform: scale(1.1); }

        /* --- PRODUCT GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 20px 8% 100px; }
        
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 35px; text-align: center;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden;
            animation: pulse-gold 6s infinite;
        }
        .card:hover { border-color: var(--gold-bright); transform: translateY(-15px) scale(1.02); z-index: 10; }
        
        /* The Shine Effect */
        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), transparent);
            transform: skewX(-25deg); transition: 0.8s;
        }
        .card:hover::before { animation: shine 1.2s forwards; }

        .img-container { height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .img-container img { 
            max-height: 100%; 
            filter: invert(1) brightness(1.8) drop-shadow(0 0 15px rgba(197, 160, 89, 0.4)); 
            transition: 0.6s; 
            opacity: 0.9;
        }
        .card:hover img { transform: scale(1.15) rotate(5deg); opacity: 1; }

        .tag { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 4px; display: block; margin-bottom: 12px; font-weight: 700; }
        .name { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 600; margin-bottom: 15px; color: #fff; line-height: 1.2; min-height: 70px; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--gold-bright); display: block; margin-bottom: 25px; }

        .buy-btn {
            display: block; width: 100%; padding: 18px; border: none;
            background: var(--gold-gradient); color: #000;
            font-weight: 800; text-transform: uppercase; text-decoration: none;
            letter-spacing: 2px; transition: 0.4s;
            font-size: 0.85rem;
        }
        .buy-btn:hover { letter-spacing: 5px; filter: brightness(1.2); }

        footer { border-top: 1px solid var(--gold); padding: 80px 5%; text-align: center; background: #000; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; }

        @media (max-width: 768px) { .hero h1 { font-size: 3rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav><a href="#" class="logo">Christian's Designer Scents</a></nav>

<section class="hero">
    <div class="reveal">
        <p>The Masterpiece Collection</p>
        <h1>Smell Like Success.</h1>
    </div>
</section>

<div class="filter-section reveal">
    <button class="btn-luxury active" onclick="filterItems('all')">The Vault</button>
    <button class="btn-luxury" onclick="filterItems('men')">👔 Kings</button>
    <button class="btn-luxury" onclick="filterItems('women')">👗 Queens</button>
</div>

<div class="grid" id="mainGrid">
    <!-- JAVASCRIPT INJECTS 40 PERFUMES HERE -->
</div>

<footer>
    <div class="footer-logo">C.D.S</div>
    <p style="letter-spacing: 5px; color: #555; font-size: 0.8rem;">ESTABLISHED 2026 | NAIROBI, KENYA</p>
</footer>

<script>
    // Premium silhouettes: Masculine square for men, Elegant curved for women
    const menBottle = "https://cdn-icons-png.flaticon.com/512/3144/3144467.png"; 
    const womenBottle = "https://cdn-icons-png.flaticon.com/512/3062/3062295.png";

    const perfumes = [
        // MEN'S (20)
        { name: "Dior Sauvage", cat: "men", price: "5,500" },
        { name: "Bleu de Chanel", cat: "men", price: "5,800" },
        { name: "Creed Aventus", cat: "men", price: "6,500" },
        { name: "YSL Y", cat: "men", price: "5,200" },
        { name: "Versace Eros", cat: "men", price: "4,500" },
        { name: "Armani Acqua di Gio", cat: "men", price: "4,800" },
        { name: "JPG Le Male Elixir", cat: "men", price: "5,500" },
        { name: "Spicebomb Extreme", cat: "men", price: "5,400" },
        { name: "Tom Ford Oud Wood", cat: "men", price: "7,500" },
        { name: "Terre d’Hermès", cat: "men", price: "5,200" },
        { name: "1 Million Elixir", cat: "men", price: "4,900" },
        { name: "Prada Carbon", cat: "men", price: "5,100" },
        { name: "Montblanc Explorer", cat: "men", price: "4,200" },
        { name: "Bvlgari Man", cat: "men", price: "4,800" },
        { name: "Boss Bottled", cat: "men", price: "4,500" },
        { name: "Lattafa Asad", cat: "men", price: "3,800" },
        { name: "Armaf CDNIM", cat: "men", price: "4,500" },
        { name: "Afnan 9PM", cat: "men", price: "3,600" },
        { name: "Rasasi Hawas", cat: "men", price: "4,200" },
        { name: "Al Haramain Amber Oud", cat: "men", price: "5,500" },

        // WOMEN'S (20)
        { name: "La Vie Est Belle", cat: "women", price: "5,200" },
        { name: "YSL Libre", cat: "women", price: "5,500" },
        { name: "Coco Mademoiselle", cat: "women", price: "6,200" },
        { name: "CH Good Girl", cat: "women", price: "5,800" },
        { name: "Dior J’adore", cat: "women", price: "5,600" },
        { name: "YSL Black Opium", cat: "women", price: "4,900" },
        { name: "Armani Si", cat: "women", price: "5,100" },
        { name: "Valentino Born in Roma", cat: "women", price: "5,600" },
        { name: "Gucci Bloom", cat: "women", price: "5,100" },
        { name: "Versace Crystal Noir", cat: "women", price: "4,800" },
        { name: "Mugler Alien", cat: "women", price: "5,500" },
        { name: "Burberry Goddess", cat: "women", price: "5,800" },
        { name: "Prada Paradoxe", cat: "women", price: "5,600" },
        { name: "Kayali Vanilla 28", cat: "women", price: "5,100" },
        { name: "Lattafa Yara (Pink)", cat: "women", price: "3,500" },
        { name: "Swiss Arabian Shaghaf Oud", cat: "women", price: "3,800" },
        { name: "Armaf CDN Woman", cat: "women", price: "3,800" },
        { name: "Ariana Grande Cloud", cat: "women", price: "4,200" },
        { name: "Zara Red Temptation", cat: "women", price: "3,200" },
        { name: "Lattafa Khamrah", cat: "women", price: "4,500" }
    ];

    function renderPerfumes(filter = 'all') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        perfumes.forEach(p => {
            if (filter === 'all' || p.cat === filter) {
                // CHOOSE BOTTLE BASED ON GENDER
                const currentImg = p.cat === 'men' ? menBottle : womenBottle;
                
                grid.innerHTML += `
                    <div class="card reveal active">
                        <span class="tag">${p.cat === 'men' ? 'Eau de Parfum' : 'Parfum de Luxe'}</span>
                        <div class="img-container">
                            <img src="${currentImg}" alt="${p.name}">
                        </div>
                        <h3 class="name">${p.name}</h3>
                        <span class="price">KES ${p.price}</span>
                        <a href="https://wa.me/254YOURNUMBER?text=Christian, I want to secure the ${p.name}" class="buy-btn">Inquire Privately</a>
                    </div>`;
            }
        });
    }

    function filterItems(cat) {
        document.querySelectorAll('.btn-luxury').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderPerfumes(cat);
    }

    // Initial Load
    renderPerfumes();

    // Intersection Observer for Smooth Reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
        });
    }, { threshold: 0.1 });

    function initObserver() {
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    window.onload = initObserver;
</script>
</body>
</html>
