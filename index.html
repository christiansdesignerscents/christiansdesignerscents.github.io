<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents | Luxury Boutique</title>
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600;1,700&family=Jost:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Your New Signature Palette */
            --dark-choco: #1e130c; /* Deep Chocolate Foundation */
            --raspberry: #d21f5b;  /* Vibrant Raspberry Pink */
            --cream: #fff5e1;       /* Smooth Cream for text */
            --gold: #c5a059;        /* Premium Gold Finish */
            --onyx: #050505;        /* Deep Black */
            
            --gold-gradient: linear-gradient(135deg, #b38728 0%, #fbf5b7 50%, #aa771c 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        body { 
            background: var(--onyx); 
            color: var(--cream); 
            font-family: 'Jost', sans-serif; 
            background-image: radial-gradient(circle at center, var(--dark-choco) 0%, var(--onyx) 100%);
        }

        /* --- REFINED SFX --- */
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(30, 19, 12, 0.95); /* Chocolate with transparency */
            backdrop-filter: blur(15px);
            padding: 1.5rem 5%;
            display: flex; justify-content: center;
            border-bottom: 2px solid var(--gold);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem; font-weight: 700; letter-spacing: 5px;
            text-transform: uppercase; text-decoration: none;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- HERO --- */
        .hero {
            height: 60vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; border-bottom: 1px solid var(--gold);
            background: linear-gradient(to bottom, rgba(30, 19, 12, 0.7), var(--onyx)), 
                        url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=2000') center/cover;
        }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-style: italic; color: var(--cream); }
        .hero p { text-transform: uppercase; letter-spacing: 8px; color: var(--raspberry); font-weight: 700; }

        /* --- FILTERS --- */
        .filter-section { padding: 120px 5% 30px; text-align: center; }
        .btn-luxury {
            background: transparent; border: 1px solid var(--dark-choco); color: var(--cream);
            padding: 12px 35px; margin: 8px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;
            transition: 0.4s;
        }
        .btn-luxury:hover, .btn-luxury.active { border-color: var(--raspberry); background: var(--raspberry); color: #fff; }

        /* --- PRODUCT GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px 8% 100px; }
        
        .card {
            background: linear-gradient(145deg, #1a0f0a 0%, #050505 100%);
            border: 1px solid var(--dark-choco);
            padding: 30px; text-align: center;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(197, 160, 89, 0.1); }
        
        .img-container { height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .img-container img { 
            max-height: 80%; 
            filter: invert(1) brightness(0.9) sepia(1) saturate(2) hue-rotate(310deg); /* Raspberry Tinted Silhouette */
            transition: 0.5s; opacity: 0.6;
        }
        .card:hover img { transform: scale(1.08); opacity: 1; filter: invert(1) brightness(1.2); }

        .tag { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; display: block; font-weight: 700; }
        .name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 12px; color: var(--cream); }
        .price { font-size: 1.4rem; font-weight: 700; color: var(--raspberry); display: block; margin-bottom: 25px; }

        .buy-btn {
            display: block; width: 100%; padding: 16px; 
            border: 1px solid var(--gold);
            background: transparent; color: var(--gold);
            font-weight: 800; text-transform: uppercase; text-decoration: none;
            letter-spacing: 2px; transition: 0.4s;
        }
        .buy-btn:hover { background: var(--gold-gradient); color: var(--onyx); border-color: transparent; }

        footer { border-top: 1px solid var(--dark-choco); padding: 60px 5%; text-align: center; background: #0a0604; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">Christian's Designer Scents</a></nav>

<section class="hero">
    <div class="reveal">
        <p>The Masterpiece Collection</p>
        <h1>Sensory Perfection.</h1>
    </div>
</section>

<div class="filter-section reveal">
    <button class="btn-luxury active" onclick="filterItems('all')">The Vault</button>
    <button class="btn-luxury" onclick="filterItems('men')">👔 Kings</button>
    <button class="btn-luxury" onclick="filterItems('women')">👗 Queens</button>
</div>

<div class="grid" id="mainGrid">
    <!-- JS Injected 40 Perfumes Here -->
</div>

<footer>
    <p style="color: var(--gold); letter-spacing: 4px; font-size: 0.9rem;">CHRISTIAN'S DESIGNER SCENTS</p>
    <p style="color: #444; margin-top: 10px; font-size: 0.7rem;">EST. 2026 | NAIROBI</p>
</footer>

<script>
    const menBottle = "https://cdn-icons-png.flaticon.com/512/3144/3144467.png"; 
    const womenBottle = "https://cdn-icons-png.flaticon.com/512/3062/3062295.png";

    const perfumes = [
        // KINGS COLLECTION (20) - Prices adjusted to 2k - 5.6k range
        { name: "Dior Sauvage", cat: "men", price: "5,400" },
        { name: "Bleu de Chanel", cat: "men", price: "5,600" },
        { name: "Creed Aventus", cat: "men", price: "5,600" },
        { name: "YSL Y", cat: "men", price: "5,200" },
        { name: "Versace Eros", cat: "men", price: "4,500" },
        { name: "Armani Acqua di Gio", cat: "men", price: "4,800" },
        { name: "JPG Le Male Elixir", cat: "men", price: "5,500" },
        { name: "Spicebomb Extreme", cat: "men", price: "5,100" },
        { name: "Tom Ford Oud Wood", cat: "men", price: "5,600" },
        { name: "Terre d’Hermès", cat: "men", price: "4,900" },
        { name: "1 Million Elixir", cat: "men", price: "4,800" },
        { name: "Prada Carbon", cat: "men", price: "4,600" },
        { name: "Montblanc Explorer", cat: "men", price: "3,800" },
        { name: "Bvlgari Man", cat: "men", price: "4,200" },
        { name: "Boss Bottled", cat: "men", price: "3,500" },
        { name: "Lattafa Asad", cat: "men", price: "2,800" },
        { name: "Armaf CDNIM", cat: "men", price: "3,200" },
        { name: "Afnan 9PM", cat: "men", price: "2,600" },
        { name: "Rasasi Hawas", cat: "men", price: "3,400" },
        { name: "Al Haramain Amber Oud", cat: "men", price: "4,500" },

        // QUEENS COLLECTION (20) - Prices adjusted to 2k - 5.6k range
        { name: "La Vie Est Belle", cat: "women", price: "5,100" },
        { name: "YSL Libre", cat: "women", price: "5,400" },
        { name: "Coco Mademoiselle", cat: "women", price: "5,600" },
        { name: "CH Good Girl", cat: "women", price: "5,300" },
        { name: "Dior J’adore", cat: "women", price: "5,500" },
        { name: "YSL Black Opium", cat: "women", price: "4,900" },
        { name: "Armani Si", cat: "women", price: "4,800" },
        { name: "Valentino Born in Roma", cat: "women", price: "5,200" },
        { name: "Gucci Bloom", cat: "women", price: "4,700" },
        { name: "Versace Crystal Noir", cat: "women", price: "4,200" },
        { name: "Mugler Alien", cat: "women", price: "5,100" },
        { name: "Burberry Goddess", cat: "women", price: "5,400" },
        { name: "Prada Paradoxe", cat: "women", price: "5,500" },
        { name: "Kayali Vanilla 28", cat: "women", price: "4,600" },
        { name: "Lattafa Yara (Pink)", cat: "women", price: "2,400" },
        { name: "Swiss Arabian Shaghaf Oud", cat: "women", price: "2,900" },
        { name: "Armaf CDN Woman", cat: "women", price: "2,800" },
        { name: "Ariana Grande Cloud", cat: "women", price: "3,500" },
        { name: "Zara Red Temptation", cat: "women", price: "2,200" },
        { name: "Lattafa Khamrah", cat: "women", price: "3,800" }
    ];

    function renderPerfumes(filter = 'all') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        perfumes.forEach(p => {
            if (filter === 'all' || p.cat === filter) {
                const currentImg = p.cat === 'men' ? menBottle : womenBottle;
                grid.innerHTML += `
                    <div class="card reveal active">
                        <span class="tag">Designer Selection</span>
                        <div class="img-container"><img src="${currentImg}" alt="${p.name}"></div>
                        <h3 class="name">${p.name}</h3>
                        <span class="price">KES ${p.price}</span>
                        <a href="https://wa.me/254YOURNUMBER?text=Christian, I'd like to order ${p.name}" class="buy-btn">Inquire Now</a>
                    </div>`;
            }
        });
    }

    function filterItems(cat) {
        document.querySelectorAll('.btn-luxury').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderPerfumes(cat);
    }

    renderPerfumes();
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
