<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents | Elite Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Jost:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #B09A72 0%, #D4C4A8 50%, #B09A72 100%);
            --dark-glass: rgba(17, 17, 17, 0.95);
            --premium-black: #0a0a0a;
            --accent-gold: #D4C4A8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Jost', sans-serif; 
            background-color: #050505; /* Deep luxury black */
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* --- LUXURY ANIMATIONS --- */
        @keyframes goldGlow {
            0% { box-shadow: 0 0 5px rgba(176, 154, 114, 0.2); }
            50% { box-shadow: 0 0 20px rgba(176, 154, 114, 0.5); }
            100% { box-shadow: 0 0 5px rgba(176, 154, 114, 0.2); }
        }

        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: var(--dark-glass);
            backdrop-filter: blur(20px);
            padding: 1.5rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .logo span { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- HERO SECTION --- */
        .hero {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #050505), 
                        url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=2000') center/cover;
            border-bottom: 2px solid var(--accent-gold);
        }

        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-style: italic;
            letter-spacing: -1px;
        }

        /* --- PREMIUM GRID --- */
        .filter-container { padding: 120px 5% 30px; text-align: center; }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: #fff;
            padding: 0.8rem 2rem;
            margin: 5px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--gold-gradient);
            color: #000;
            border-color: transparent;
        }

        .scents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 40px 8%; }

        .scent-card {
            background: #111;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
            animation: goldGlow 4s infinite;
        }

        .scent-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .scent-card:hover::before { left: 100%; }

        .image-box { 
            height: 350px; 
            padding: 30px; 
            background: radial-gradient(circle, #222 0%, #111 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .scent-img { 
            max-width: 100%; max-height: 100%; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .scent-card:hover .scent-img { transform: scale(1.1) rotate(3deg); }

        .card-body { padding: 2rem; text-align: center; background: #0a0a0a; }
        .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent-gold); }
        .price-tag { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; display: block; color: #fff; }

        .whatsapp-btn {
            display: block;
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            padding: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        footer { background: #000; padding: 5rem; text-align: center; border-top: 1px solid var(--accent-gold); }
    </style>
</head>
<body>

<nav><a href="#" class="logo">CHRISTIAN <span>SCENTS</span></a></nav>

<section class="hero">
    <div class="fade-in">
        <h1>The Gold Standard.</h1>
        <p style="letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem;">Elite Fragrances for the 1%</p>
    </div>
</section>

<div class="filter-container fade-in">
    <button class="filter-btn active" onclick="filterScent('all')">The Collection</button>
    <button class="filter-btn" onclick="filterScent('men')">👔 Kings</button>
    <button class="filter-btn" onclick="filterScent('women')">👗 Queens</button>
</div>

<div class="scents-grid">
    <!-- DIOR SAUVAGE -->
    <div class="scent-card men fade-in">
        <div class="image-box"><img src="https://www.dior.com/dw/image/v2/BBDL_PRD/on/demandware.static/-/Sites-master_dior/default/dw69421503/assets/y0066001/Y006604000_E01_ZHC.jpg" class="scent-img"></div>
        <div class="card-body">
            <h3 class="card-name">Dior Sauvage</h3>
            <span class="price-tag">KES 5,500</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Claim Yours</a>
        </div>
    </div>

    <!-- LATTAFA KHAMRAH -->
    <div class="scent-card women fade-in">
        <div class="image-box"><img src="https://m.media-amazon.com/images/I/71LqI3x-IEL.jpg" class="scent-img"></div>
        <div class="card-body">
            <h3 class="card-name">Lattafa Khamrah</h3>
            <span class="price-tag">KES 4,800</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Claim Yours</a>
        </div>
    </div>
    
    <!-- (Add the rest of your 40 fragrances using this same card structure) -->
</div>

<footer>
    <p style="font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--accent-gold);">Christian's Designer Scents</p>
</footer>

<script>
    // Fade-in Intersection Observer
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    function filterScent(category) {
        const cards = document.querySelectorAll('.scent-card');
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        cards.forEach(card => {
            card.style.display = (category === 'all' || card.classList.contains(category)) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
