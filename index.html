<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F8F5F0;
            --charcoal: #111111; /* Darker for better readability */
            --gold: #967E4F;    /* Deeper gold for contrast */
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Jost', sans-serif; 
            background: var(--cream); 
            color: var(--charcoal);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: var(--white);
            padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--charcoal);
            text-transform: uppercase;
        }

        /* --- FILTER SYSTEM --- */
        .filter-container { padding: 120px 5% 20px; text-align: center; }
        .filter-btn {
            background: var(--white);
            border: 2px solid var(--charcoal);
            padding: 0.7rem 1.5rem;
            margin: 5px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .filter-btn.active { background: var(--charcoal); color: white; }

        /* --- GRID SYSTEM --- */
        .scents-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 20px 5%; 
        }

        .scent-card {
            background: var(--white);
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .image-box { height: 300px; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .scent-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-body { padding: 1.5rem; text-align: center; border-top: 1px solid #eee; }
        
        /* DARKER, READABLE TEXT */
        .card-category { color: var(--gold); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; color: #000; }
        .price-tag { font-size: 1.3rem; font-weight: 600; color: var(--charcoal); margin-bottom: 15px; display: block; }

        .whatsapp-btn {
            display: block;
            background: #25D366; /* Standard WhatsApp Green for visibility */
            color: white;
            text-decoration: none;
            padding: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
        }

        footer { background: var(--charcoal); color: white; padding: 3rem; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">Christian's DESIGNER Scents</a>
</nav>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterScent('all')">All Fragrances</button>
    <button class="filter-btn" onclick="filterScent('men')">👔 Men's</button>
    <button class="filter-btn" onclick="filterScent('women')">👗 Women's</button>
</div>

<div class="scents-grid" id="scentGrid">
    <!-- DIOR SAUVAGE -->
    <div class="scent-card men">
        <div class="image-box"><img src="https://www.dior.com/dw/image/v2/BBDL_PRD/on/demandware.static/-/Sites-master_dior/default/dw69421503/assets/y0066001/Y006604000_E01_ZHC.jpg" class="scent-img"></div>
        <div class="card-body">
            <span class="card-category">Men's Bestseller</span>
            <h3 class="card-name">Dior Sauvage</h3>
            <span class="price-tag">KES 5,500</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Order Now</a>
        </div>
    </div>

    <!-- YSL LIBRE -->
    <div class="scent-card women">
        <div class="image-box"><img src="https://m.media-amazon.com/images/I/61i6l38xIeL.jpg" class="scent-img"></div>
        <div class="card-body">
            <span class="card-category">Women's Bestseller</span>
            <h3 class="card-name">YSL Libre</h3>
            <span class="price-tag">KES 5,200</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Order Now</a>
        </div>
    </div>

    <!-- ARMAF CDNIM -->
    <div class="scent-card men">
        <div class="image-box"><img src="https://m.media-amazon.com/images/I/71Y-tT8U8rL.jpg" class="scent-img"></div>
        <div class="card-body">
            <span class="card-category">Men's Popular</span>
            <h3 class="card-name">Club De Nuit Intense</h3>
            <span class="price-tag">KES 4,500</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Order Now</a>
        </div>
    </div>

    <!-- LATTAFA KHAMRAH -->
    <div class="scent-card women">
        <div class="image-box"><img src="https://m.media-amazon.com/images/I/71LqI3x-IEL.jpg" class="scent-img"></div>
        <div class="card-body">
            <span class="card-category">Unisex Viral</span>
            <h3 class="card-name">Lattafa Khamrah</h3>
            <span class="price-tag">KES 4,800</span>
            <a href="https://wa.me/254YOURNUMBER" class="whatsapp-btn">Order Now</a>
        </div>
    </div>

    <!-- ADD THE REST OF YOUR LIST HERE USING THE SAME CARD FORMAT -->
</div>

<footer>
    <p>&copy; 2026 Christian's Designer Scents</p>
</footer>

<script>
    function filterScent(category) {
        const cards = document.querySelectorAll('.scent-card');
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        cards.forEach(card => {
            card.style.display = (category === 'all' || card.classList.contains(category)) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
