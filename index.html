<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents | Luxury Boutique</title>
    
    <!-- Tab Icon (Favicon) -->
    <link rel="icon" type="image/png" href="images/logo.png">

    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600;1,700&family=Jost:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
    :root {
        /* Changed Gold to Deep Crimson & Onyx */
        --accent-red: #8b0000;
        --bright-red: #ff3131;
        --deep-black: #050505;
        --card-bg: linear-gradient(145deg, #0f0f0f 0%, #050505 100%);
        --red-glow: rgba(255, 0, 0, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
    
    body { 
        background: var(--deep-black); 
        color: #fff; 
        font-family: 'Jost', sans-serif; 
        background-image: radial-gradient(circle at center, #120000 0%, #050505 100%);
    }

    /* --- REDUCED GLOW ANIMATIONS --- */
    @keyframes shine { from { left: -100%; } to { left: 100%; } }
    
    /* Subtler, darker pulse */
    @keyframes pulse-red { 
        0% { box-shadow: 0 0 5px rgba(139, 0, 0, 0.1); } 
        50% { box-shadow: 0 0 15px rgba(139, 0, 0, 0.3); } 
        100% { box-shadow: 0 0 5px rgba(139, 0, 0, 0.1); } 
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* --- NAVIGATION --- */
    nav {
        position: fixed; top: 0; width: 100%; z-index: 1000;
        background: rgba(5, 5, 5, 0.98);
        padding: 1.5rem 5%;
        display: flex; justify-content: center;
        border-bottom: 1px solid var(--accent-red);
    }
    .logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 2rem; font-weight: 700; letter-spacing: 5px;
        text-transform: uppercase; text-decoration: none;
        color: var(--bright-red);
        text-shadow: 0 0 10px rgba(255, 49, 49, 0.4);
    }

    /* --- HERO --- */
    .hero {
        height: 60vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; border-bottom: 1px solid var(--accent-red);
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), var(--deep-black)), 
                    url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=2000') center/cover;
    }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: #eee; }
    .hero p { text-transform: uppercase; letter-spacing: 8px; color: var(--accent-red); }

    /* --- FILTERS --- */
    .filter-section { padding: 120px 5% 30px; text-align: center; }
    .btn-luxury {
        background: transparent; border: 1px solid #333; color: #888;
        padding: 12px 35px; margin: 8px; cursor: pointer;
        text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem;
        transition: 0.4s;
    }
    .btn-luxury:hover, .btn-luxury.active { border-color: var(--bright-red); color: #fff; box-shadow: 0 0 10px var(--red-glow); }

    /* --- PRODUCT GRID --- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px 8% 100px; }
    
    .card {
        background: var(--card-bg);
        border: 1px solid #1a1a1a;
        padding: 30px; text-align: center;
        transition: 0.5s;
        position: relative; overflow: hidden;
        animation: pulse-red 8s infinite;
    }
    .card:hover { border-color: var(--accent-red); transform: translateY(-10px); }
    
    /* SHARP REDUCED GLOW */
    .img-container { height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .img-container img { 
        max-height: 85%; 
        /* Dimmed the silhouette: Invert stays, but opacity and brightness are lowered */
        filter: invert(1) brightness(0.7) drop-shadow(0 0 5px rgba(255, 0, 0, 0.2)); 
        transition: 0.5s; 
        opacity: 0.5;
    }
    .card:hover img { transform: scale(1.05); opacity: 0.9; filter: invert(1) brightness(1.2) drop-shadow(0 0 10px var(--bright-red)); }

    .tag { color: var(--accent-red); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; display: block; }
    .name { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; margin-bottom: 12px; color: #ddd; }
    .price { font-size: 1.3rem; font-weight: 700; color: #fff; display: block; margin-bottom: 20px; }

    .buy-btn {
        display: block; width: 100%; padding: 15px; border: 1px solid var(--accent-red);
        background: transparent; color: #fff;
        font-weight: 700; text-transform: uppercase; text-decoration: none;
        letter-spacing: 1px; transition: 0.3s;
    }
    .buy-btn:hover { background: var(--accent-red); color: #fff; }

    footer { border-top: 1px solid #1a1a1a; padding: 60px 5%; text-align: center; color: #444; }
</style>
</head>
<body>

<nav><a href="#" class="logo">Christian's Designer Scents</a></nav>

<section class="hero">
    <div class="reveal">
        <p>The Masterpiece Collection</p>
        <h1>Smell Like Success.</h1>
    </div>
</section>

<div class="filter-section reveal">
    <button class="btn-luxury active" onclick="filterItems('all')">The Vault</button>
    <button class="btn-luxury" onclick="filterItems('men')">👔 Kings</button>
    <button class="btn-luxury" onclick="filterItems('women')">👗 Queens</button>
</div>

<div class="grid" id="mainGrid">
    <!-- JAVASCRIPT INJECTS 40 PERFUMES HERE -->
</div>

<footer>
    <div class="footer-logo">C.D.S</div>
    <p style="letter-spacing: 5px; color: #555; font-size: 0.8rem;">ESTABLISHED 2026 | NAIROBI, KENYA</p>
</footer>

<script>
    // Premium silhouettes: Masculine square for men, Elegant curved for women
    const menBottle = "https://cdn-icons-png.flaticon.com/512/3144/3144467.png"; 
    const womenBottle = "https://cdn-icons-png.flaticon.com/512/3062/3062295.png";

    const perfumes = [
        // MEN'S (20)
        { name: "Dior Sauvage", cat: "men", price: "5,500" },
        { name: "Bleu de Chanel", cat: "men", price: "5,800" },
        { name: "Creed Aventus", cat: "men", price: "6,500" },
        { name: "YSL Y", cat: "men", price: "5,200" },
        { name: "Versace Eros", cat: "men", price: "4,500" },
        { name: "Armani Acqua di Gio", cat: "men", price: "4,800" },
        { name: "JPG Le Male Elixir", cat: "men", price: "5,500" },
        { name: "Spicebomb Extreme", cat: "men", price: "5,400" },
        { name: "Tom Ford Oud Wood", cat: "men", price: "7,500" },
        { name: "Terre d’Hermès", cat: "men", price: "5,200" },
        { name: "1 Million Elixir", cat: "men", price: "4,900" },
        { name: "Prada Carbon", cat: "men", price: "5,100" },
        { name: "Montblanc Explorer", cat: "men", price: "4,200" },
        { name: "Bvlgari Man", cat: "men", price: "4,800" },
        { name: "Boss Bottled", cat: "men", price: "4,500" },
        { name: "Lattafa Asad", cat: "men", price: "3,800" },
        { name: "Armaf CDNIM", cat: "men", price: "4,500" },
        { name: "Afnan 9PM", cat: "men", price: "3,600" },
        { name: "Rasasi Hawas", cat: "men", price: "4,200" },
        { name: "Al Haramain Amber Oud", cat: "men", price: "5,500" },

        // WOMEN'S (20)
        { name: "La Vie Est Belle", cat: "women", price: "5,200" },
        { name: "YSL Libre", cat: "women", price: "5,500" },
        { name: "Coco Mademoiselle", cat: "women", price: "6,200" },
        { name: "CH Good Girl", cat: "women", price: "5,800" },
        { name: "Dior J’adore", cat: "women", price: "5,600" },
        { name: "YSL Black Opium", cat: "women", price: "4,900" },
        { name: "Armani Si", cat: "women", price: "5,100" },
        { name: "Valentino Born in Roma", cat: "women", price: "5,600" },
        { name: "Gucci Bloom", cat: "women", price: "5,100" },
        { name: "Versace Crystal Noir", cat: "women", price: "4,800" },
        { name: "Mugler Alien", cat: "women", price: "5,500" },
        { name: "Burberry Goddess", cat: "women", price: "5,800" },
        { name: "Prada Paradoxe", cat: "women", price: "5,600" },
        { name: "Kayali Vanilla 28", cat: "women", price: "5,100" },
        { name: "Lattafa Yara (Pink)", cat: "women", price: "3,500" },
        { name: "Swiss Arabian Shaghaf Oud", cat: "women", price: "3,800" },
        { name: "Armaf CDN Woman", cat: "women", price: "3,800" },
        { name: "Ariana Grande Cloud", cat: "women", price: "4,200" },
        { name: "Zara Red Temptation", cat: "women", price: "3,200" },
        { name: "Lattafa Khamrah", cat: "women", price: "4,500" }
    ];

    function renderPerfumes(filter = 'all') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        perfumes.forEach(p => {
            if (filter === 'all' || p.cat === filter) {
                // CHOOSE BOTTLE BASED ON GENDER
                const currentImg = p.cat === 'men' ? menBottle : womenBottle;
                
                grid.innerHTML += `
                    <div class="card reveal active">
                        <span class="tag">${p.cat === 'men' ? 'Eau de Parfum' : 'Parfum de Luxe'}</span>
                        <div class="img-container">
                            <img src="${currentImg}" alt="${p.name}">
                        </div>
                        <h3 class="name">${p.name}</h3>
                        <span class="price">KES ${p.price}</span>
                        <a href="https://wa.me/254YOURNUMBER?text=Christian, I want to secure the ${p.name}" class="buy-btn">Inquire Privately</a>
                    </div>`;
            }
        });
    }

    function filterItems(cat) {
        document.querySelectorAll('.btn-luxury').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderPerfumes(cat);
    }

    // Initial Load
    renderPerfumes();

    // Intersection Observer for Smooth Reveal
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('active');
        });
    }, { threshold: 0.1 });

    function initObserver() {
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    window.onload = initObserver;
</script>
</body>
</html>
