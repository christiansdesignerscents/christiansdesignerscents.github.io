<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Designer Scents | Official Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Jost:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --deep-black: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --gold-gradient: linear-gradient(135deg, #b38728 0%, #fbf5b7 50%, #aa771c 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--deep-black); 
            color: #fff; 
            font-family: 'Jost', sans-serif; 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* --- LUXURY ANIMATIONS --- */
        @keyframes shine { from { left: -100%; } to { left: 100%; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- NAV --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(15px);
            padding: 1.5rem 5%;
            display: flex; justify-content: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem; letter-spacing: 5px;
            text-transform: uppercase; color: #fff; text-decoration: none;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- HERO --- */
        .hero {
            height: 60vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            border-bottom: 1px solid var(--gold);
        }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-style: italic; margin-bottom: 10px; }
        .hero p { text-transform: uppercase; letter-spacing: 8px; font-weight: 300; font-size: 0.9rem; color: var(--gold); }

        /* --- FILTERS --- */
        .filter-section { padding: 120px 5% 40px; text-align: center; }
        .btn-luxury {
            background: transparent; border: 1px solid var(--gold); color: #fff;
            padding: 12px 35px; margin: 10px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;
            transition: 0.5s; position: relative; overflow: hidden;
        }
        .btn-luxury:hover, .btn-luxury.active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        /* --- THE GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 0 8% 100px; }
        
        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; text-align: center;
            transition: 0.5s; position: relative; overflow: hidden;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
        }
        .card:hover::after { animation: shine 0.8s forwards; }

        .img-container { height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .img-container img { max-height: 100%; transition: 0.5s; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); }
        .card:hover img { transform: scale(1.1); }

        .tag { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 10px; height: 60px; }
        .price { font-size: 1.3rem; font-weight: 700; color: #fff; display: block; margin-bottom: 20px; }

        .buy-btn {
            display: block; width: 100%; padding: 15px; border: none;
            background: var(--gold-gradient); color: #000;
            font-weight: 700; text-transform: uppercase; text-decoration: none;
            letter-spacing: 1px; transition: 0.3s;
        }
        .buy-btn:hover { filter: brightness(1.2); }

        footer { border-top: 1px solid var(--gold); padding: 50px; text-align: center; background: #000; }
    </style>
</head>
<body>

<nav><a href="#" class="logo">Christian's Designer Scents</a></nav>

<section class="hero">
    <div class="reveal">
        <h1>Essential Luxury.</h1>
        <p>The 2026 Collection</p>
    </div>
</section>

<div class="filter-section">
    <button class="btn-luxury active" onclick="filterItems('all')">All Fragrances</button>
    <button class="btn-luxury" onclick="filterItems('men')">👔 The Gentlemen</button>
    <button class="btn-luxury" onclick="filterItems('women')">👗 The Ladies</button>
</div>

<div class="grid" id="mainGrid">

    function renderPerfumes(filter = 'all') {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        perfumes.forEach(p => {
            if (filter === 'all' || p.cat === filter) {
                grid.innerHTML += `
                    <div class="card reveal active">
                        <span class="tag">${p.cat}</span>
                        <div class="img-container"><img src="${p.img}" alt="${p.name}"></div>
                        <h3 class="name">${p.name}</h3>
                        <span class="price">KES ${p.price}</span>
                        <a href="https://wa.me/254YOURNUMBER?text=Hi Christian, I'd like to order ${p.name}" class="buy-btn">Inquire Now</a>
                    </div>`;
            }
        });
    }

    function filterItems(cat) {
        document.querySelectorAll('.btn-luxury').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderPerfumes(cat);
    }

    // Initial Load
    renderPerfumes();

    // Scroll Reveal Logic
    window.addEventListener('scroll', () => {
        document.querySelectorAll('.reveal').forEach(el => {
            if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
        });
    });
</script>
